replicas: 1

service:
  type: ClusterIP
  port: 80

adminUser: admin

adminPassword: admin

persistence:
  enabled: true
  size: 5Gi

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        isDefault: true

serviceMonitor:
  enabled: false