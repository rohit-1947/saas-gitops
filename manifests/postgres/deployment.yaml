apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres-saas-db
  namespace: saas-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres-saas-db

  template:
    metadata:
      labels:
        app: postgres-saas-db

    spec:
      containers:
        - name: postgres
          image: postgres:17.5

          ports:
            - containerPort: 5432

          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB

            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD

          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data

      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc